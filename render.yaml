# Render Blueprint for Paperclip
# https://github.com/paperclipai/paperclip
# One web service + Postgres + Render Persistent Disk (paid plan). See doc/RENDER.md.

databases:
  - name: paperclip-db
    databaseName: paperclip
    user: paperclip
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: paperclip
    runtime: node
    plan: starter

    disk:
      name: paperclip-data
      mountPath: /opt/render/project/src/paperclip-data
      sizeGB: 5

    # Skip server tsc (avoids upstream type error); run server with tsx so it transpiles at runtime.
    buildCommand: NODE_ENV=development pnpm install --frozen-lockfile && pnpm --filter @paperclipai/ui exec vite build
    startCommand: pnpm --filter @paperclipai/server exec tsx src/index.ts

    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: SERVE_UI
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: private
      - key: PAPERCLIP_MIGRATION_AUTO_APPLY
        value: "true"
      - key: PAPERCLIP_HOME
        value: /opt/render/project/src/paperclip-data
      - key: BETTER_AUTH_SECRET
        sync: false

    healthCheckPath: /
